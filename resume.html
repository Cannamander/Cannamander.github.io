  <div class="resume-page">
    <div class="hero-grid"></div>

  <script src="site.js"></script>
  <script>
    (function() {
      var DARK_SRC = 'assets/tavis-fong-code-resume.pdf';
      var LIGHT_SRC = 'assets/tavis-fong-code-resume-light.pdf';

      var frame = document.getElementById('resume-frame');
      var download = document.getElementById('resume-download');
      var toggle = document.getElementById('resume-variant-toggle');

      if (!frame || !download || !toggle) return;

      function setVariant(variant) {
        var isLight = variant === 'light';
        var src = isLight ? LIGHT_SRC : DARK_SRC;

        frame.setAttribute('src', src);
        download.setAttribute('href', src);

        toggle.textContent = isLight ? 'Dark version' : 'Light version';
        toggle.setAttribute('aria-pressed', String(isLight));

        try { localStorage.setItem('resumeVariant', isLight ? 'light' : 'dark'); } catch (e) {}
      }

      toggle.addEventListener('click', function() {
        var current = (toggle.getAttribute('aria-pressed') === 'true') ? 'light' : 'dark';
        setVariant(current === 'light' ? 'dark' : 'light');
      });

      var saved = null;
      try { saved = localStorage.getItem('resumeVariant'); } catch (e) {}
      setVariant(saved === 'light' ? 'light' : 'dark');
    })();
  </script>

</body>
</html>
